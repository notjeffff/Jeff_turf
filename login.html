<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Login | TurfArena</title>
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/global.css?v=2">
    <link rel="stylesheet" href="css/login.css?v=2"> <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .auth-toggle { display: flex; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 20px; padding: 5px; }
        .toggle-btn { flex: 1; padding: 10px; text-align: center; color: var(--text-muted); cursor: pointer; border-radius: 8px; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .toggle-btn.active { background: var(--primary); color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div style="position:fixed; top:18px; right:18px; z-index:1000;">
        <button class="theme-toggle" type="button" data-theme-toggle></button>
    </div>
    <div class="login-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="logo" onclick="window.location.href='index.html'"><span class="logo-badge">♛</span> Turf<span>Arena</span></div>
                <h2 id="formTitle">Welcome Back</h2>
                <p id="formSubtitle">Sign in to book turfs and join teams</p>
            </div>

            <div class="auth-toggle">
                <div class="toggle-btn active" id="btnSignIn" onclick="toggleView('signin')">Sign In</div>
                <div class="toggle-btn" id="btnSignUp" onclick="toggleView('signup')">Create Account</div>
            </div>

            <form id="signInForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="player@turfarena.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth">Sign In</button>
            </form>

            <form id="signUpForm" class="hidden">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="e.g. Lionel Messi" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="regPhone" placeholder="10-digit mobile" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="player@turfarena.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPass" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn-auth">Create Account</button>
            </form>

            <div class="auth-footer">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        const storedApiHost = localStorage.getItem('apiHost');
        const API_HOST = !storedApiHost || storedApiHost === 'http://127.0.0.1:5000'
    ? 'http://127.0.0.1:5001'
            : storedApiHost;
        if (storedApiHost !== API_HOST) localStorage.setItem('apiHost', API_HOST);
        const BASE_URL = `${API_HOST}/api`;

        // Toggle UI
        function toggleView(view) {
            const isSignIn = view === 'signin';
            document.getElementById('signInForm').classList.toggle('hidden', !isSignIn);
            document.getElementById('signUpForm').classList.toggle('hidden', isSignIn);
            document.getElementById('btnSignIn').classList.toggle('active', isSignIn);
            document.getElementById('btnSignUp').classList.toggle('active', !isSignIn);
            
            document.getElementById('formTitle').innerText = isSignIn ? "Welcome Back" : "Join TurfArena";
            document.getElementById('formSubtitle').innerText = isSignIn ? "Sign in to book turfs and join teams" : "Create an account to get started";
        }

        // Handle Registration
        document.getElementById('signUpForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value.trim();

            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const phonePattern = /^\d{10}$/;
            const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d]).{8,}$/;

            if (!name || !phone || !email || !pass) {
                alert('Please fill all fields.');
                return;
            }

            if (!emailPattern.test(email)) {
                alert('Please enter a valid email address.');
                return;
            }

            if (!phonePattern.test(phone)) {
                alert('Please enter a valid 10-digit phone number.');
                return;
            }

            if (!passwordPattern.test(pass)) {
                alert('Password must be at least 8 characters and include uppercase, lowercase, number, and special character.');
                return;
            }

            try {
                const res = await fetch(`${BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone, email, password: pass })
                });

                const data = await res.json();
                if (!res.ok) {
                    return alert(data.error || 'Registration failed.');
                }

                localStorage.setItem('currentUser', JSON.stringify(data.user));
                alert("Account created! Welcome to TurfArena.");
                window.location.href = 'user-dashboard.html';
            } catch (error) {
                alert("Unable to connect to backend. Start the server and try again.");
            }
        });

        // Handle Login
        document.getElementById('signInForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;

            try {
                const res = await fetch(`${BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pass })
                });

                const data = await res.json();
                if(!res.ok) {
                    return alert(data.error || "Invalid email or password. Try again!");
                }

                localStorage.setItem('currentUser', JSON.stringify(data.user));
                window.location.href = 'index.html';
            } catch (error) {
                alert("Unable to connect to backend. Start the server and try again.");
            }
        });
    </script>
</body>
</html>
