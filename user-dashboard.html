<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard | TurfArena</title>
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/community.css">
    <link rel="stylesheet" href="css/user-dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .dashboard-container { max-width: 1100px; margin: 120px auto 50px; padding: 0 20px; }
        .user-welcome { 
            background: linear-gradient(180deg, color-mix(in srgb, var(--surface-2) 94%, transparent), color-mix(in srgb, var(--surface-1) 98%, transparent));
            padding: 40px; border-radius: 24px; border: 1px solid var(--border-soft);
            margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 24px 70px rgba(2, 6, 23, 0.22);
        }
        .user-welcome h1 { font-size: 2.5rem; margin: 0; }
        .user-welcome h1 span { color: var(--primary); }
        
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--surface-2); padding: 25px; border-radius: 20px; border: 1px solid var(--border-soft); text-align: center; }
        .stat-card h4 { color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; margin-bottom: 10px; }
        .stat-card .val { font-size: 2rem; font-weight: 800; color: var(--text); }

        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .data-card { background: var(--surface-2); border-radius: 24px; padding: 30px; border: 1px solid var(--border-soft); }
        .data-card h2 { margin-top: 0; margin-bottom: 25px; font-size: 1.25rem; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--text-muted); font-size: 0.75rem; padding-bottom: 15px; text-transform: uppercase; }
        td { padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .status-tag { padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .tag-pending { background: rgba(253, 224, 71, 0.1); color: #fde047; }
        .tag-confirmed { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .tag-cancelled { background: rgba(239, 68, 68, 0.12); color: #fca5a5; }
        .btn-cancel-booking {
            border: 1px solid rgba(239, 68, 68, 0.4);
            background: rgba(239, 68, 68, 0.12);
            color: #fecaca;
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-cancel-booking[disabled] {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .team-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.05); }
        .team-item:first-child { border-top: none; }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-logo" onclick="window.location.href='index.html'"><span class="nav-logo-icon">♛</span> Turf<span>Arena</span></div>
        <div class="nav-links">
            <a href="index.html">Book Turf</a>
            <a href="community.html">Community</a>
            <button class="theme-toggle" type="button" data-theme-toggle></button>
            <button class="btn-sm" onclick="logout()" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444;">Logout</button>
        </div>
    </nav>

    <main class="dashboard-container">
        <div class="user-welcome">
            <div>
                <h1 id="welcomeName">Welcome back, <span>Player</span></h1>
                <p style="color: var(--text-muted); margin-top: 5px;">Manage your bookings and team activities.</p>
            </div>
            <button class="btn btn-primary" onclick="window.location.href='index.html'">New Booking</button>
        </div>

        <div class="stats-row">
            <div class="stat-card"><h4>Total Bookings</h4><div class="val" id="countBookings">0</div></div>
            <div class="stat-card"><h4>Teams Joined</h4><div class="val" id="countTeams">0</div></div>
            <div class="stat-card"><h4>Credits</h4><div class="val" id="creditsValue">₹0</div></div>
        </div>

        <div class="dashboard-grid">
            <div class="data-card">
                <h2>My Booking History</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Turf</th>
                            <th>Date/Time</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Refund</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="userBookingTable">
                        </tbody>
                </table>
            </div>

            <div class="data-card">
                <h2>My Team Requests</h2>
                <div id="userTeamsList">
                    </div>
            </div>
        </div>
    </main>

    <script src="js/user-dashboard.js"></script>
</body>
</html>
